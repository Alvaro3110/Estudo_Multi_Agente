<aside class="sidebar" [class.collapsed]="!isExpanded">
  <div class="sidebar-header">
    <div class="logo-container" *ngIf="isExpanded">
      <img src="assets/images/santander-logo.svg" alt="Santander AI" class="logo-img">
    </div>
    <button class="toggle-btn" (click)="toggle()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M3 12h18M3 6h18M3 18h18" *ngIf="!isExpanded"></path>
        <path d="M19 12H5M12 19l-7-7 7-7" *ngIf="isExpanded"></path>
      </svg>
    </button>
  </div>

  <nav class="sidebar-nav">
    <div class="nav-section">
      <div class="section-label" *ngIf="isExpanded">Menu Principal</div>
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" class="nav-item">
        <div class="item-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
        </div>
        <span class="item-text" *ngIf="isExpanded">Dashboard</span>
      </a>
      <a routerLink="/chat" routerLinkActive="active" class="nav-item">
        <div class="item-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
        </div>
        <span class="item-text" *ngIf="isExpanded">Perguntar para IA</span>
      </a>
      <a routerLink="/historico" routerLinkActive="active" class="nav-item">
        <div class="item-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
        </div>
        <span class="item-text" *ngIf="isExpanded">Histórico</span>
      </a>
    </div>

    <!-- MEUS GRUPOS ENRIQUECIDOS -->
    <div class="nav-section groups-section">
      <div class="section-label" *ngIf="isExpanded">Meus Grupos</div>
      
      <div class="groups-list">
        <div class="grupo-item"
             *ngFor="let group of groups$ | async"
             [class.grupo-active]="group.active"
             [class.grupo-locked]="group.locked"
             [title]="group.locked ? group.name + ' — sem acesso' : group.name"
             (click)="onGroupClick(group)">

          <!-- ÍCONE COLORIDO -->
          <div class="g-ico" [ngClass]="'gc-' + group.colorVariant">
            <app-dept-icon [type]="group.iconType"></app-dept-icon>
          </div>

          <!-- INFO: nome + subtítulo -->
          <div class="g-info" *ngIf="isExpanded">
            <div class="g-name" [class.g-name-active]="group.active"
                 [class.g-name-locked]="group.locked">
              {{ group.name }}
            </div>
            <div class="g-sub">{{ group.departmentCount }} departamentos</div>
          </div>

          <!-- DIREITA: badge de alertas ou cadeado -->
          <div class="g-right" *ngIf="isExpanded">
            <!-- Badge de alerta (apenas se não bloqueado e alertCount > 0) -->
            <div class="g-alert"
                 *ngIf="!group.locked && group.alertCount > 0"
                 [ngClass]="group.alertSeverity === 'critical' ? 'ga-critical' : 'ga-warning'">
              {{ group.alertCount }}
            </div>

            <!-- Cadeado (apenas se bloqueado) -->
            <div class="g-lock" *ngIf="group.locked">
              <svg width="11" height="11" viewBox="0 0 24 24" fill="none"
                   stroke="#CCC" stroke-width="1.6" stroke-linecap="round">
                <rect x="3" y="11" width="18" height="11" rx="2"></rect>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
              </svg>
            </div>
          </div>
        </div>
      </div>
    </div>
  </nav>

  <div class="sidebar-footer" *ngIf="user$ | async as user">
    <div class="user-info" *ngIf="isExpanded">
      <div class="user-avatar">{{ user.nome.charAt(0) }}</div>
      <div class="user-details">
        <div class="user-name">{{ user.nome }}</div>
        <div class="user-role">{{ user.perfil }}</div>
      </div>
    </div>
    <button class="logout-btn" (click)="logout()" [title]="'Sair'">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"></path>
      </svg>
    </button>
  </div>
</aside>
