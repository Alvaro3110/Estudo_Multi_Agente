<aside class="sidebar" [class.collapsed]="!isExpanded">
  <div class="sb-top">
    <div class="sb-logo" *ngIf="isExpanded">
      <!-- SVG Chama Santander + Texto -->
      <img src="assets/images/santander-logo-red.svg" alt="Santander Logo" class="chama-red" />
    </div>
    <div class="sb-logo-ico" *ngIf="!isExpanded">
      <img src="assets/images/santander-logo-red.svg" alt="Santander Logo" class="chama-red icon-only" />
    </div>
    <button class="toggle-btn" (click)="toggle()" [title]="isExpanded ? 'Recolher' : 'Expandir'">
      <svg viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="2">
        <line x1="3" y1="12" x2="21" y2="12"></line>
        <line x1="3" y1="6" x2="21" y2="6"></line>
        <line x1="3" y1="18" x2="21" y2="18"></line>
      </svg>
    </button>
  </div>

  <div class="persona-section" *ngIf="user$ | async as user">
    <div class="sb-sec-label">ACESSO ATUAL</div>
    <div class="persona-card" [class.collapsed]="!isExpanded">
      <div class="gestor-dot"></div>
      <span class="acesso-badge-text">{{ user.perfil }}</span>
    </div>
  </div>

  <nav class="group-nav">
    <div class="sb-sec-label">NAVEGAÇÃO</div>
    <ul class="sb-menu">
      <li class="sb-item" routerLink="/dashboard" routerLinkActive="active" [title]="'Dashboard Executivo'">
        <span class="icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
        </span>
        <span class="sb-item-label">Dashboard</span>
      </li>
      <li class="sb-item" routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" [title]="'Início'">
        <span class="icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
        </span>
        <span class="sb-item-label">Início</span>
      </li>
      <li class="sb-item" routerLink="/chat" routerLinkActive="active" [title]="'Perguntar para IA'">
        <span class="icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
        </span>
        <span class="sb-item-label">Perguntar para IA</span>
      </li>
      <li class="sb-item" routerLink="/historico" routerLinkActive="active" [title]="'Histórico de Análises'">
        <span class="icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 8v4l3 3m6-3a9 9 0 1 1-18 0 9 9 0 0 1 18 0z"></path></svg>
        </span>
        <span class="sb-item-label">Histórico</span>
      </li>
      <li class="sb-item" *ngIf="(user$ | async)?.perfil === 'Admin'" routerLink="/configuracoes" routerLinkActive="active" [title]="'Configurações'">
        <span class="icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
        </span>
        <span class="sb-item-label">Configurações</span>
      </li>
    </ul>

    <div class="divider"></div>

    <div class="sb-sec-label">MEUS GRUPOS</div>
    
    <!-- Skeleton Loading -->
    <div *ngIf="isLoadingGroups$ | async" class="grupos-loading">
      <div class="skeleton" *ngFor="let i of [1,2,3]"></div>
    </div>

    <!-- Lista Dinâmica de Grupos -->
    <ul class="group-list" *ngIf="groups$ | async as groups">
      <li *ngFor="let group of groups" 
          class="grupo-item" 
          [class.active]="(activeGroupId$ | async) === group.id"
          [class.locked]="group.locked"
          [title]="group.name"
          (click)="onGroupClick(group)">
        <div class="grupo-ico" [ngClass]="getGroupIconClass(group.color)">
          <!-- Ícone simplificado baseado no tipo -->
          <svg *ngIf="group.iconType === 'phone'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>
          <svg *ngIf="group.iconType === 'home'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
          <svg *ngIf="group.iconType === 'leaf'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8 0 5.5-4.78 10-10 10Z"></path><path d="M2 21c0-3 1.85-5.36 5.08-6C9.5 14.52 12 13 13 12"></path></svg>
        </div>
        <span class="grupo-name">{{ group.name }}</span>
        <svg *ngIf="group.locked" class="lock-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
        </svg>
      </li>
    </ul>
  </nav>

  <div class="sb-footer">
    <button class="logout-btn" (click)="logout()" [title]="'Sair'">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
      <span class="sb-footer-text">Sair do sistema</span>
    </button>
  </div>
</aside>
