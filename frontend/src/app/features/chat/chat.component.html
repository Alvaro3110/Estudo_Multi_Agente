<div class="chat-container">
  <div class="historico-banner" *ngIf="showHistoricoReturnBanner">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
    <span>Reexecutando análise do Histórico</span>
    <span class="hb-dismiss" (click)="showHistoricoReturnBanner = false">✕</span>
  </div>

  <!-- HEADER DO CHAT -->
  <header class="chat-header">
    <div class="header-left">
      <div class="agent-avatar-header">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
          <path d="M12 2a10 10 0 1 0 10 10A10 10 0 0 0 12 2zm0 18a8 8 0 1 1 8-8 8 8 0 0 1-8 8z"></path>
          <circle cx="12" cy="12" r="3"></circle>
        </svg>
      </div>
      <div class="header-info">
        <div class="title">Agente Principal</div>
        <div class="subtitle">Orquestra múltiplos agentes especializados</div>
      </div>
    </div>
    <div class="header-right">
      <div class="group-pill">Varejo Digital SP</div>
      <div class="status-badge">
        <span class="dot pulse"></span>
        monitorado no painel
      </div>

      <!-- BOTÃO DE MONITORAMENTO DOS AGENTES — Apenas perfil plataforma/administrator -->
      <button 
        *ngIf="hasMonitorAccess"
        class="monitor-btn" 
        [class.active]="drawerOpen"
        [class.has-steps]="drawerSteps.length > 0"
        (click)="toggleDrawer()"
        title="Monitorar Agentes (Modo Plataforma)"
      >
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect>
          <line x1="8" y1="21" x2="16" y2="21"></line>
          <line x1="12" y1="17" x2="12" y2="21"></line>
        </svg>
        Monitor
        <span class="monitor-count" *ngIf="drawerSteps.length > 0">{{ drawerSteps.length }}</span>
        <span class="monitor-live" *ngIf="isStreaming">
          <span class="live-dot"></span>
          AO VIVO
        </span>
      </button>
    </div>
  </header>

  <main class="chat-messages" #scrollContainer>
    <div class="chat-body">
      <!-- Mensagens históricas -->
      <ng-container *ngFor="let msg of messages">
        
        <div class="message-row user" *ngIf="msg.type === 'user'">
          <div class="bubble-wrapper">
            <div class="msg-user-bubble">{{ msg.content }}</div>
          </div>
        </div>

        <app-agent-bubble *ngIf="msg.type === 'agent_report'"
          [step]="msg.step!"
          [agentName]="msg.step!.agent_id!"
          [agentType]="msg.step!.agent_id!.replace('agente_', '')"
          [timestamp]="'agora'">
        </app-agent-bubble>

        <app-agent-bubble *ngIf="msg.type === 'error'"
          [step]="msg.step!"
          agentName="Sistema"
          agentType="erro"
          timestamp="agora">
        </app-agent-bubble>

        <app-hitl-card *ngIf="msg.type === 'checkpoint'"
          [step]="msg.step!"
          (decision)="onHitlDecision($event)">
        </app-hitl-card>

        <!-- Relatório final: usa ReportCard quando há relatório estruturado -->
        <div class="message-row assistant" *ngIf="msg.type === 'stream_final'">
          <ng-container *ngIf="msg.step?.report; else markdownFallback">
            <app-report-card
              [step]="msg.step!"
              agentName="Agente Principal"
              timestamp="agora">
            </app-report-card>
          </ng-container>
          <ng-template #markdownFallback>
            <div class="agent-avatar-msg">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
                <path d="M12 2a10 10 0 1 0 10 10A10 10 0 0 0 12 2zm0 18a8 8 0 1 1 8-8 8 8 0 0 1-8 8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
            </div>
            <div class="bubble-wrapper">
              <div class="agent-name">Agente Principal</div>
              <div class="msg-agent-bubble streaming-text agent-bubble-content" [innerHTML]="(msg.content || '') | markdown">
              </div>
            </div>
          </ng-template>
        </div>

      </ng-container>

      <!-- Pipeline Tracker (inline, durante streaming) -->
      <app-pipeline-tracker
        *ngIf="pipelineVisible && currentPipeline"
        [state]="currentPipeline">
      </app-pipeline-tracker>
    </div>
  </main>

  <footer class="chat-input-wrapper">
    <div class="input-context">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#CCC" stroke-width="2">
        <path d="M12 2a10 10 0 1 0 10 10A10 10 0 0 0 12 2zm0 18a8 8 0 1 1 8-8 8 8 0 0 1-8 8z"></path>
        <circle cx="12" cy="12" r="3"></circle>
      </svg>
      Agente Principal · {{ agentCount }} agentes disponíveis · Varejo Digital SP
    </div>

    <div class="input-row">
      <textarea 
        [(ngModel)]="userInput" 
        (keydown.enter)="$event.preventDefault(); send()" 
        [disabled]="isWaitingHitl || state === 'streaming'"
        placeholder="Peça algo..."
        rows="1"></textarea>
      
      <button class="send-btn" (click)="send()" [disabled]="isWaitingHitl || state === 'streaming' || !userInput.trim()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>

    <div class="input-hint" *ngIf="isWaitingHitl">
      Aguardando aprovação antes de continuar
    </div>
  </footer>
</div>

<!-- AGENT DRAWER (slide-in from right) -->
<app-agent-drawer
  [open]="drawerOpen"
  [steps]="drawerSteps"
  [activeNode]="drawerActiveNode"
  [sessionId]="currentSessionId"
  (close)="drawerOpen = false">
</app-agent-drawer>
